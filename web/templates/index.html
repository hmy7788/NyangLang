<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>냥Lang 온라인 실행기</title>
  <link rel="stylesheet" href="../static/style.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <img class="header-cat-seat" src="/static/images/header-cat.png" alt="" aria-hidden="true" />
      <div class="logo">
        <span class="logo-mark">냥</span>
        <div class="logo-text">
          <h1>냥Lang 온라인</h1>
          <p>뇌절 고양이 언어를 브라우저에서 바로 실행해보세요.</p>
        </div>
      </div>
      <div class="header-right">
        <span class="pill pill-beta">BETA</span>
      </div>
    </header>

    <main class="main">
      <section class="panel panel-editor">
        <div class="panel-header">
          <span class="panel-title">코드 편집기</span>
          <div class="panel-actions">
            <button id="run-btn" class="btn btn-primary">실행하기 ⏵</button>
            <button id="clear-btn" class="btn btn-ghost">초기화 ↺</button>
            <select id="example-select" class="select">
              <option value="">샘플 코드 불러오기…</option>
              <option value="hello">[예제] 헬로 월드</option>
              <option value="loop">[예제] 반복 출력</option>
              <option value="input">[예제] 입력 / 출력</option>
            </select>
          </div>
        </div>

        <div class="editor-wrapper">
          <div class="editor-shell">
            <pre id="line-numbers" class="line-numbers">1</pre>
            <textarea id="code-editor" spellcheck="false" wrap="off"># 여기에 냥Lang 코드를 입력하세요.
# 예제는 오른쪽 상단 셀렉트 박스에서 선택할 수 있습니다.
            </textarea>
          </div>
        </div>


        <div class="toolbar">
          <div class="toolbar-left">
            <span class="shortcut-hint">
              Ctrl + Enter로도 실행할 수 있습니다.
            </span>
          </div>
        </div>
      </section>

      <section class="panel panel-output">
        <div class="panel-header">
          <span class="panel-title">출력 콘솔</span>
          <button id="copy-output-btn" class="btn btn-ghost btn-small">
            출력 복사
          </button>
        </div>
        <div class="output-wrapper">
          <pre id="output" class="output"><span class="output-placeholder">여기에 실행 결과가 표시됩니다.
코드를 작성한 뒤 [실행하기] 버튼을 눌러보세요.
          </span></pre>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>🐾 NyangLang Playground</span>
      <span class="dot">•</span>
      <span>백엔드는 FastAPI, 인터프리터는 Python으로 돌아갑니다.</span>
    </footer>
  </div>

  <script>
    const editor = document.getElementById('code-editor');
    const lineNumbers = document.getElementById('line-numbers');
    const runBtn = document.getElementById('run-btn');
    const clearBtn = document.getElementById('clear-btn');
    const output = document.getElementById('output');
    const exampleSelect = document.getElementById('example-select');
    const copyOutputBtn = document.getElementById('copy-output-btn');

    const examples = {
      hello: `# "Hello World!"를 출력하는 코드
# H: 72
..........~야옹 .......~야옹
냐냐냐냐~야옹 냥~~야옹 냥~야옹 ..~야옹 냐냐~야옹 냥~~야옹
냥!!??야옹

# e: 101
..........~야옹 ..........~야옹
냐냐냐냐~야옹 냥냥~~야옹 냥냥~야옹 .~야옹 냐냐~야옹 냥냥~~야옹
냥냥!!??야옹

# l: 108
냥냥~야옹 .......~야옹
냐냐~야옹 냥냥냥~~야옹 냥냥냥~야옹
냥냥냥!!??야옹

# l: 108
냥냥~야옹 .......~야옹
냐냐~야옹 냥냥냥~~야옹 냥냥냥~야옹
냥냥냥!!??야옹

# o: 111
...~야옹 냐냐~야옹 냥냥냥냥~~야옹
냥냥냥냥!!???야옹

# W: 87
냥~야옹 ...............~야옹
냐냐~야옹 냥~~야옹 냥!!??야옹

# o: 111
냥냥냥냥!!??야옹

# r: 114
냥냥냥냥~야옹 ...~야옹 냐냐~야옹 냥냥냥냥냥~~야옹
냥냥냥냥냥!!??야옹

# l: 108
냥냥냥!!??야옹

# d: 100
냥냥~야옹 .~야옹 냐냐냐~야옹 냥냥~~야옹
냥냥!!??야옹

# !: 33
...~야옹 ...........~야옹 냐냐냐냐~야옹 냥~~야옹
냥!!??야옹`,
      loop: `냥.야옹 냥냥.....야옹
냥!?야옹 냥~야옹 .~야옹 냐냐~야옹 냥~~야옹
냥냥~야옹 ,~야옹 냐냐~야옹 냥냥~~야옹
냥냥?..야옹`,
      input: `냥??야옹 냥!?야옹`
    };

    let currentErrorLine = null;
    let ws = null;

    // ── 라인 번호 ──────────────────────────────────────────
    function updateLineNumbers(errorLine = null) {
      currentErrorLine = errorLine;
      const lines = (editor.value || '').split('\n').length || 1;
      let buf = '';
      for (let i = 1; i <= lines; i++) {
        buf += i === errorLine
          ? `<span style="color:#ef4444;font-weight:bold">${i}</span>\n`
          : i + '\n';
      }
      lineNumbers.innerHTML = buf;
      if (errorLine) {
        const lh = parseFloat(getComputedStyle(editor).lineHeight);
        editor.scrollTop = Math.max(0, (errorLine - 1) * lh - editor.clientHeight / 3);
        lineNumbers.scrollTop = editor.scrollTop;
      }
    }

    // ── 출력창 ────────────────────────────────────────────
    function clearOutput() {
      output.innerHTML = '';
      output.classList.remove('output-error');
    }

    function appendOutput(text, isError = false) {
      const span = document.createElement('span');
      span.textContent = text;
      if (isError) span.style.color = 'var(--error)';
      output.appendChild(span);
      output.scrollTop = output.scrollHeight;
    }

    // ── 터미널 입력 프롬프트 ──────────────────────────────
    function showInputPrompt(prompt) {
      const line = document.createElement('span');
      line.className = 'terminal-input-line';

      const promptSpan = document.createElement('span');
      promptSpan.className = 'terminal-prompt';
      promptSpan.textContent = prompt;

      const inputEl = document.createElement('input');
      inputEl.type = 'text';
      inputEl.className = 'terminal-input';

      line.appendChild(promptSpan);
      line.appendChild(inputEl);
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
      setTimeout(() => inputEl.focus(), 0);

      inputEl.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const value = inputEl.value;
        const staticSpan = document.createElement('span');
        staticSpan.textContent = prompt + value + '\n';
        line.replaceWith(staticSpan);
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'input', value }));
        }
      });
    }

    // ── 실행 ──────────────────────────────────────────────
    function runCode() {
      const code = editor.value;
      if (!code.trim()) {
        clearOutput();
        appendOutput('⚠ 코드가 비어 있습니다. 무언가를 적어 주세요!', true);
        return;
      }

      if (ws) { ws.close(); ws = null; }

      clearOutput();
      updateLineNumbers(null);
      runBtn.disabled = true;
      runBtn.textContent = '실행 중...';

      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws/run`);

      ws.onopen = () => ws.send(JSON.stringify({ code }));

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'output') {
          appendOutput(msg.data);
        } else if (msg.type === 'input_request') {
          showInputPrompt(msg.prompt);
        } else if (msg.type === 'done') {
          runBtn.disabled = false;
          runBtn.textContent = '실행하기 ⏵';
          if (msg.status === 'error') {
            updateLineNumbers(msg.error_line || null);
            const lineInfo = msg.error_line ? ` (${msg.error_line}번 줄)` : '';
            appendOutput(`\n❌${lineInfo} ${msg.error_msg}`, true);
          }
        }
      };

      ws.onerror = () => {
        appendOutput('❌ 연결 오류가 발생했습니다.', true);
        runBtn.disabled = false;
        runBtn.textContent = '실행하기 ⏵';
      };

      ws.onclose = () => {
        if (runBtn.disabled) {
          runBtn.disabled = false;
          runBtn.textContent = '실행하기 ⏵';
        }
      };
    }

    // ── 이벤트 리스너 ─────────────────────────────────────
    runBtn.addEventListener('click', runCode);

    editor.addEventListener('input', () => updateLineNumbers(currentErrorLine));

    editor.addEventListener('scroll', () => {
      lineNumbers.scrollTop = editor.scrollTop;
    });

    updateLineNumbers();

    clearBtn.addEventListener('click', () => {
      if (ws) { ws.close(); ws = null; }
      editor.value = '';
      updateLineNumbers(null);
      clearOutput();
    });

    exampleSelect.addEventListener('change', (e) => {
      const key = e.target.value;
      if (!key) return;
      editor.value = examples[key] || '';
      updateLineNumbers();
    });

    copyOutputBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(output.innerText || '');
      } catch (e) { console.error(e); }
    });

    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        runCode();
      }
    });
  </script>
</body>
</html>
